const screen = document.getElementById('screen');
let idx = 0, paused = false, timer = null;
const speedMap = [0, 900, 500, 220, 80, 20];

function speedVal() { return speedMap[parseInt(document.getElementById('speed').value)] || 220; }

function renderLine(l) {
  if (l.type === 'blank') { const d = document.createElement('div'); d.style.height='6px'; screen.appendChild(d); return; }
  if (l.type === 'bar') {
    const d = document.createElement('div');
    d.className = 'bar-wrap';
    d.innerHTML = `<div class="bar"><span style="color:var(--dim);font-size:11px;">[${l.label}]</span><span class="progress"><span class="fill ${l.color||''}" id="fill_${idx}" style="width:0%"></span></span><span style="color:var(--dim);font-size:11px;" id="pct_${idx}">0%</span></div>`;
    screen.appendChild(d);
    let p = 0;
    const fi = d.querySelector(`#fill_${idx}`), pi = d.querySelector(`#pct_${idx}`);
    const iv = setInterval(() => {
      p = Math.min(p + Math.random()*12+4, 100);
      fi.style.width = p.toFixed(0) + '%';
      pi.textContent = p.toFixed(0) + '%';
      if (p >= 100) clearInterval(iv);
    }, 80);
    return;
  }
  const div = document.createElement('div');
  if (l.type === 'cmd') {
    div.className = 'line';
    div.innerHTML = `<span class="ts">${l.t}</span><span class="prompt">❯ </span><span class="cmd">${l.text}</span>`;
  } else if (l.type === 'out') {
    div.innerHTML = `<span class="out">${l.text}</span>`;
  } else if (l.type === 'prompt') {
    div.className = 'line';
    div.innerHTML = `<span class="ts">${l.t}</span><span class="prompt">${l.text}</span>`;
  } else {
    const cls = l.type === 'section' ? 'section' : l.type === 'ok' ? 'ok' : l.type === 'warn' ? 'warn' : l.type === 'err' ? 'err' : l.type === 'dim' ? 'dim' : 'info';
    div.className = 'line';
    div.innerHTML = `<span class="ts">${l.t||''}</span><span class="${cls}">${l.text}</span>`;
  }
  screen.appendChild(div);
  screen.scrollTop = screen.scrollHeight;
}

function next() {
  if (paused || idx >= lines.length) return;
  renderLine(lines[idx++]);
  if (idx < lines.length) timer = setTimeout(next, speedVal());
}

document.getElementById('btn-play').addEventListener('click', () => {
  paused = false;
  if (idx < lines.length) { clearTimeout(timer); next(); }
});
document.getElementById('btn-pause').addEventListener('click', () => { paused = true; clearTimeout(timer); });
document.getElementById('btn-reset').addEventListener('click', () => {
  paused = true; clearTimeout(timer);
  screen.innerHTML = ''; idx = 0;
  paused = false; next();
});

next();
